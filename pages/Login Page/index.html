<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BREW-HA-Login</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Stardos+Stencil:wght@700&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- ========== NAVBAR ========== -->
<nav>
  <div class="nav-left">
    <div class="brand-container">
      <div class="account-dropdown-container" tabindex="0" aria-haspopup="true" aria-expanded="false">
        <svg class="account-icon" stroke="white" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="7" r="4" />
          <path d="M5.5 21c1.5-4 11-4 13 0" />
        </svg>
        <div class="dropdown-menu" role="menu">
          <a href="#" role="menuitem">Logout</a>
        </div>
      </div>
      <span class="brewha-text">BREW-HA</span>
    </div>
  </div>

  <div class="nav-right">
    <a href="#" class="login-link" id="navLoginLink">Login</a>
    <a href="register.html" id="navRegisterLink">Register</a>
  </div>
</nav>

<!-- ========== MAIN (LOGIN FORM) ========== -->
<main>
  <div class="login-form">
    <h2>Login</h2>

    <div class="input-group">
      <span class="material-icons">email</span>
      <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
      <span class="material-icons">lock</span>
      <input type="password" placeholder="Password" id="password">
      <button class="password-toggle" onclick="togglePassword()" type="button">
        <span class="material-icons" id="toggleIcon">visibility_off</span>
      </button>
    </div>

    <button class="login-btn" id="loginBtn">LOGIN</button>

    <div class="or-text">Or login with</div>

    <div class="social-buttons">
      <a href="https://www.facebook.com" target="_blank" class="social-button">
        <span class="facebook-icon">
          <svg viewBox="0 0 24 24">
            <path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.877v-6.987h-2.54v-2.89h2.54v-2.205c0-2.507 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.463h-1.26c-1.243 0-1.63.771-1.63 1.562v1.875h2.773l-.443 2.89h-2.33v6.987C18.343 21.128 22 16.991 22 12z"/>
          </svg>
        </span>
        <span>Facebook</span>
      </a>

      <a href="https://accounts.google.com" target="_blank" class="social-button google-icon">
        <svg width="30" height="30" viewBox="0 0 533.5 544.3">
          <path d="M533.5 278.4c0-17.4-1.5-34.1-4.3-50.3H272v95.4h146.9c-6.3 34.3-25.5 63.5-54.7 83v68h88.2c51.4-47.4 81.1-117.4 81.1-195.1z" fill="#4285f4"/>
          <path d="M272 544.3c73.4 0 135.2-24.3 180.2-65.8l-88.2-68c-24.5 16.3-55.7 26-92 26-70.7 0-130.8-47.8-152.4-112.3h-90.1v70.7C69.4 486.7 162.6 544.3 272 544.3z" fill="#34a853"/>
          <path d="M119.6 322.4c-9.5-28.6-9.5-59.5 0-88.1v-70.7h-90.1c-38.8 76.5-38.8 167.6 0 244.1l90.1-70.7z" fill="#fbbc04"/>
          <path d="M272 107.7c39.9 0 75.9 13.7 104.1 40.6l78-78C398.3 24 338.3 0 272 0 162.6 0 69.4 57.6 29.5 142.9l90.1 70.7c21.6-64.5 81.7-112.3 152.4-112.3z" fill="#ea4335"/>
        </svg>
        <span>Google</span>
      </a>
    </div>

    <div class="no-account">
      Don't have an account? <a href="register.html" id="registerLink">Register</a>
    </div>
  </div>
</main>

<!-- ========== FOOTER ========== -->
<footer>
  <div class="footer-top-row">
    <div class="footer-brewha">BREW-HA</div>
  </div>
  <div class="footer-divider"></div>
  <div class="footer-bottom-row">
    <div class="footer-copyright">© 2026 All Rights Reserved</div>
    <div class="footer-social">
      <span>Follow Us</span>
      <a href="https://www.facebook.com" target="_blank">
        <svg class="footer-social-icon" viewBox="0 0 24 24">
          <path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.877v-6.987h-2.54v-2.89h2.54v-2.205c0-2.507 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.463h-1.26c-1.243 0-1.63.771-1.63 1.562v1.875h2.773l-.443 2.89h-2.33v6.987C18.343 21.128 22 16.991 22 12z"/>
        </svg>
      </a>
      <a href="https://www.instagram.com" target="_blank">
        <svg class="footer-social-icon" viewBox="0 0 24 24">
          <path d="M7.75 2A5.75 5.75 0 002 7.75v8.5A5.75 5.75 0 007.75 22h8.5A5.75 5.75 0 0022 16.25v-8.5A5.75 5.75 0 0016.25 2h-8.5zM12 7a5 5 0 110 10 5 5 0 010-10zm5.25-1.5a1.25 1.25 0 11-2.5 0 1.25 1.25 0 012.5 0zM12 9a3 3 0 100 6 3 3 0 000-6z"/>
        </svg>
      </a>
    </div>
  </div>
</footer>

<!-- External JavaScript -->
<script src="assets/js/script.js"></script>
</body>
</html>
