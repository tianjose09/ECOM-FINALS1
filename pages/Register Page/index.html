<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BREW-HA-Register</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Stardos+Stencil:wght@700&display=swap" rel="stylesheet">

<!-- External CSS -->
<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<!-- ========== NAVBAR ========== -->
<nav>
  <div class="nav-left">
    <div class="brand-container">
      <div class="account-dropdown-container" tabindex="0" aria-haspopup="true" aria-expanded="false">
        <svg class="account-icon" stroke="white" fill="none" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="7" r="4"/>
          <path d="M5.5 21c1.5-4 11-4 13 0"/>
        </svg>

        <div class="dropdown-menu">
          <a href="#">Logout</a>
        </div>
      </div>

      <span class="brewha-text">BREW-HA</span>
    </div>
  </div>

  <div class="nav-right">
    <a href="login.html">Login</a>
    <a href="#" class="register-link">Register</a>
  </div>
</nav>

<!-- ========== MAIN ========== -->
<main>

<div class="register-form">

<h2>Register</h2>

<div class="input-group">
<span class="material-icons">email</span>
<input type="email" id="email" placeholder="Email" required>
</div>

<div class="input-group">
<span class="material-icons">lock</span>
<input type="password" id="password" placeholder="Create password" required>
<button class="password-toggle" onclick="togglePassword('password','toggleIcon1')" type="button">
<span class="material-icons" id="toggleIcon1">visibility_off</span>
</button>
</div>

<div class="input-group">
<span class="material-icons">lock_outline</span>
<input type="password" id="confirmPassword" placeholder="Confirm password" required>
<button class="password-toggle" onclick="togglePassword('confirmPassword','toggleIcon2')" type="button">
<span class="material-icons" id="toggleIcon2">visibility_off</span>
</button>
</div>

<button class="register-btn" id="registerBtn">REGISTER</button>

<div class="or-text">Or register with</div>

<!-- Social buttons -->
<div class="social-buttons">

<a href="https://www.facebook.com" target="_blank" class="social-button">
<span class="facebook-icon">
<svg viewBox="0 0 24 24">
<path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.877v-6.987h-2.54v-2.89h2.54v-2.205c0-2.507 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.463h-1.26c-1.243 0-1.63.771-1.63 1.562v1.875h2.773l-.443 2.89h-2.33v6.987C18.343 21.128 22 16.991 22 12z"/>
</svg>
</span>
<span>Facebook</span>
</a>

<a href="https://accounts.google.com" target="_blank" class="social-button google-icon">
<span>Google</span>
</a>

</div>

<div class="have-account">
Already have an account? <a href="login.html">Login</a>
</div>

</div>
</main>

<!-- ========== FOOTER ========== -->
<footer>

<div class="footer-top-row">
<div class="footer-brewha">BREW-HA</div>
</div>

<div class="footer-divider"></div>

<div class="footer-bottom-row">

<div class="footer-copyright">
© 2026 All Rights Reserved
</div>

</div>

</footer>

<!-- External JavaScript -->
<script src="assets/js/script.js"></script>

</body>
</html>
