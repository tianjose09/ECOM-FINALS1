<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BREW-HA-Shopping Cart</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Stardos+Stencil:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <link rel="stylesheet" href="../Cart Page/assets/css/style.css">
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="brand-container">
      <div class="account-dropdown-container" id="accountDropdown" tabindex="0" aria-haspopup="true" aria-expanded="false">
        <svg class="account-icon" stroke="white" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="7" r="4" />
          <path d="M5.5 21c1.5-4 11-4 13 0" />
        </svg>
        <div class="dropdown-menu" id="dropdownMenu" role="menu">
          <a href="#" role="menuitem">Logout</a>
        </div>
      </div>
      <a href="/index.html" class="brewha-text">BREW-HA</a>
    </div>
  </div>

  <div class="nav-right">
    <a href="../../index.html">Home</a>
    <a href="../Product Catalog Page/index.html">Menu</a>
    <a href="../Cart Page/index.html" class="active">Order</a>
    <a href="../About us Page/index.html">About Us</a>
    <a href="../Contact Page/index.html">Contact</a>
    <a href="#" class="icon-link" id="searchIcon"><i class="fas fa-search"></i></a>
  </div>
</nav>

<div class="main-content">

  <div class="search-overlay" id="searchOverlay">
    <div class="search-header">
      <input type="text" id="searchInput" placeholder="Search items in your cart...">
      <button id="searchButton">Search</button>
      <span class="close-search" id="closeSearch">&times;</span>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <h1 class="title">Shopping Cart</h1>

  <div class="categories">
    <button class="cat-btn active" onclick="filterCategory('all')">All</button>
    <button class="cat-btn" onclick="filterCategory('drinks')">Drink</button>
    <button class="cat-btn" onclick="filterCategory('pastry')">Pastry</button>
    <button class="cat-btn" onclick="filterCategory('pasta')">Pasta</button>
    <button class="back-btn" onclick="window.location.href='../Product Catalog Page/index.html'">← Back to Menu</button>
  </div>

  <div class="cart-container">
    <div class="cart-header">
      <div>Product</div>
      <div>Add Ons</div>
      <div>Price</div>
      <div>Qty.</div>
      <div></div>
    </div>
    <div id="cartItems"></div>
  </div>

  <div class="summary" id="summarySection">
    <div class="summary-title">Order Summary</div>
    <div class="summary-header">
      <div>Item</div>
      <div>Price</div>
      <div>Qty</div>
    </div>
    <div id="summaryItems"></div>
  </div>

  <div class="cart-footer-section" id="cartFooterSection">
    <div class="cart-container">
      <div class="total">Total Price: ₱ <span id="totalPrice">0</span></div>
    </div>
    <div class="checkout">
      <button onclick="goToCheckoutPage()">Check Out</button>
    </div>
  </div>

</div>

<footer>
  <div class="footer-top-row">
    <div class="footer-brewha">BREW-HA</div>
  </div>
  <div class="footer-divider"></div>
  <div class="footer-bottom-row">
    <div class="footer-copyright">© 2026 All Rights Reserved</div>
    <div class="footer-social">
      <span>Follow Us</span>
      <a href="https://www.facebook.com" target="_blank">
        <svg class="footer-social-icon" viewBox="0 0 24 24">
          <path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.877v-6.987h-2.54v-2.89h2.54v-2.205c0-2.507 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.463h-1.26c-1.243 0-1.63.771-1.63 1.562v1.875h2.773l-.443 2.89h-2.33v6.987C18.343 21.128 22 16.991 22 12z"/>
        </svg>
      </a>
      <a href="https://www.instagram.com" target="_blank">
        <svg class="footer-social-icon" viewBox="0 0 24 24">
          <path d="M7.75 2A5.75 5.75 0 002 7.75v8.5A5.75 5.75 0 007.75 22h8.5A5.75 5.75 0 0022 16.25v-8.5A5.75 5.75 0 0016.25 2h-8.5zM12 7a5 5 0 110 10 5 5 0 010-10zm5.25-1.5a1.25 1.25 0 11-2.5 0 1.25 1.25 0 012.5 0zM12 9a3 3 0 100 6 3 3 0 000-6z"/>
        </svg>
      </a>
    </div>
  </div>
</footer>

<script src="../Cart Page/assets/js/scripts.js"></script>
</body>
</html>
